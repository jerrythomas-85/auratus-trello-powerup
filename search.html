<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ver CRM</title>
  <link rel="stylesheet" href="styles.css?v=4">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="config.js?v=1"></script>
  <script src="auth.js?v=1"></script>
  <script src="sheets.js?v=1"></script>
  <style>
    /* Estilos específicos da vista de pesquisa board-level.
       Mantidos aqui para não tocar no styles.css já provado. */
    #search-app {
      max-width: 960px;
      margin: 0 auto;
    }
    #search-app h1 {
      font-size: 20px;
      font-weight: 700;
      color: #0052cc;
      margin-bottom: 16px;
    }
    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 2px solid #dfe1e6;
      margin-bottom: 16px;
    }
    .tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      color: #5e6c84;
      cursor: pointer;
    }
    .tab:hover {
      color: #172b4d;
    }
    .tab.active {
      color: #0052cc;
      border-bottom-color: #0052cc;
    }
    .tab-panel {
      display: none;
    }
    .tab-panel.active {
      display: block;
    }
  </style>
</head>
<body>
  <div id="search-app">
    <h1>Ver CRM</h1>
    <div class="tabs">
      <button class="tab active" data-tab="empresas">Empresas</button>
      <button class="tab" data-tab="pessoas">Pessoas</button>
      <button class="tab" data-tab="lista">Lista</button>
      <button class="tab" data-tab="importar">Importar</button>
    </div>
    <div class="tab-panel active" id="tab-empresas">
      <p class="empty">Em breve: pesquisa de empresas.</p>
    </div>
    <div class="tab-panel" id="tab-pessoas">
      <p class="empty">Em breve: pesquisa de pessoas.</p>
    </div>
    <div class="tab-panel" id="tab-lista">
      <p class="empty">A carregar...</p>
    </div>
    <div class="tab-panel" id="tab-importar">
      <p class="empty">A preparar importação...</p>
    </div>
  </div>
  <script src="search.js?v=6"></script>
</body>
</html>
