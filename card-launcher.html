<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesquisa CRM</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { padding: 12px; }
    .launch-btn { width: 100%; }
  </style>
</head>
<body>
  <button id="abrir" class="btn-primary launch-btn">🔍 Abrir Pesquisa CRM</button>
  <script>
    const t = TrelloPowerUp.iframe();
    document.getElementById('abrir').addEventListener('click', () => {
      return t.modal({
        title: 'Pesquisa CRM',
        url: './search.html',
        fullscreen: true
      });
    });
  </script>
</body>
</html>
