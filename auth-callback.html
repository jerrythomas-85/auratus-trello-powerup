<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>A autenticar...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #fff;
      color: #172b4d;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <p>A autenticar, aguarde...</p>
  <script>
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');
    const expiresIn = params.get('expires_in');
    const error = params.get('error');

    if (accessToken) {
      const expiry = Date.now() + (parseInt(expiresIn) || 3600) * 1000;
      const maxAge = parseInt(expiresIn) || 3600;
      // Guarda em cookie acessível ao iframe
      document.cookie = `auratus_token=${accessToken};max-age=${maxAge};path=/;SameSite=None;Secure`;
      document.cookie = `auratus_expiry=${expiry};max-age=${maxAge};path=/;SameSite=None;Secure`;
      document.querySelector('p').textContent = 'Autenticado! A fechar...';
      setTimeout(() => window.close(), 500);
    } else if (error) {
      document.querySelector('p').textContent = 'Erro: ' + error;
    } else {
      document.querySelector('p').textContent = 'Sem token. Tenta novamente.';
    }
  </script>
</body>
</html>
