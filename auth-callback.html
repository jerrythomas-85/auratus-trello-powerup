<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>A autenticar...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #fff;
      color: #172b4d;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <p>A autenticar, aguarde...</p>
  <script>
    // O token vem no hash do URL: #access_token=...&expires_in=...
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');
    const expiresIn = params.get('expires_in');
    const error = params.get('error');

    if (accessToken) {
      // Guarda o token no sessionStorage da janela pai
      if (window.opener) {
        window.opener.postMessage({
          type: 'OAUTH_TOKEN',
          token: accessToken,
          expiresIn: parseInt(expiresIn) || 3600
        }, 'https://jerrythomas-85.github.io');
        window.close();
      }
    } else if (error) {
      document.querySelector('p').textContent = 'Erro: ' + error;
    } else {
      document.querySelector('p').textContent = 'Sem token. Tenta novamente.';
    }
  </script>
</body>
</html>
