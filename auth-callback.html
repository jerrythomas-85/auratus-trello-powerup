<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>A autenticar...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #fff;
      color: #172b4d;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <p>A autenticar, aguarde...</p>
  <script>
    (async () => {
      const msg = document.querySelector('p');
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');

      if (error) { msg.textContent = 'Erro: ' + error; return; }
      if (!code) { msg.textContent = 'Sem código de autorização. Tenta novamente.'; return; }

      try {
        const redirect_uri = window.location.origin + window.location.pathname;
        const res = await fetch('/api/auth/exchange', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, redirect_uri })
        });
        const data = await res.json();
        if (!res.ok || !data.access_token) {
          msg.textContent = 'Erro ao obter token: ' + (data.error || 'desconhecido');
          return;
        }

        const maxAge = parseInt(data.expires_in) || 3600;
        const expiry = Date.now() + maxAge * 1000;
        document.cookie = `auratus_token=${data.access_token};max-age=${maxAge};path=/;SameSite=None;Secure`;
        document.cookie = `auratus_expiry=${expiry};max-age=${maxAge};path=/;SameSite=None;Secure`;
        if (data.refresh_token) {
          document.cookie = `auratus_refresh=${data.refresh_token};max-age=${60 * 60 * 24 * 365};path=/;SameSite=None;Secure`;
        }

        msg.textContent = 'Autenticado! A fechar...';
        setTimeout(() => window.close(), 400);
      } catch (e) {
        msg.textContent = 'Erro: ' + e;
      }
    })();
  </script>
</body>
</html>
